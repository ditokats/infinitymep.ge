<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Infinity MEP — Plan to Form</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0e11;--wht:#dce4ea;--cyan:#37c2d6;--accent:#e2542a;--dim:#7e95a3;--grid:#161d24;--grid2:#222e38;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"IBM Plex Mono",monospace;color:var(--dim)}
  svg{width:100vw;height:100vh;display:block;touch-action:none;background:radial-gradient(130% 120% at 50% 10%,#10161c,var(--bg) 72%)}
  text{user-select:none}
  #frame{position:fixed;inset:14px;border:1px solid rgba(125,160,176,.28);pointer-events:none;z-index:8}
  #frame::before,#frame::after{content:"";position:absolute;width:14px;height:14px;border:1px solid var(--accent)}
  #frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
  #frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
  #tl{position:fixed;top:30px;left:30px;z-index:10;color:var(--dim);font-size:11px;letter-spacing:.16em;line-height:1.8}
  #tl b{color:var(--cyan)}
  .back{position:fixed;top:30px;right:30px;z-index:10;color:var(--dim);text-decoration:none;font-size:11px;
    letter-spacing:.14em;border:1px solid rgba(125,160,176,.26);padding:9px 14px;border-radius:3px;transition:.2s}
  .back:hover{color:var(--accent);border-color:var(--accent)}
  #hint{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:10;color:var(--dim);font-size:10px;
    letter-spacing:.18em;opacity:.7;pointer-events:none}
  #logo{position:fixed;right:30px;bottom:24px;z-index:10}#logo svg{width:32px;height:32px}
</style>
</head>
<body>
<svg id="scene" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 800">
  <defs>
    <pattern id="gmin" width="22" height="22" patternUnits="userSpaceOnUse"><path d="M22 0H0V22" fill="none" stroke="var(--grid)" stroke-width="1"/></pattern>
    <pattern id="gmaj" width="110" height="110" patternUnits="userSpaceOnUse"><path d="M110 0H0V110" fill="none" stroke="var(--grid2)" stroke-width="1"/></pattern>
    <pattern id="floor" width="13" height="13" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="13" stroke="rgba(220,228,234,.10)" stroke-width="1"/></pattern>
  </defs>
  <rect id="grid" x="0" y="0" width="1200" height="800" fill="url(#gmin)"/>
  <rect x="0" y="0" width="1200" height="800" fill="url(#gmaj)"/>
  <g id="art"></g>
  <!-- extrude slider -->
  <g id="slider" style="cursor:ns-resize">
    <line id="track" x1="1120" y1="220" x2="1120" y2="600" stroke="rgba(125,160,176,.4)" stroke-width="2"/>
    <line x1="1112" y1="220" x2="1128" y2="220" stroke="var(--dim)" stroke-width="1"/>
    <line x1="1112" y1="600" x2="1128" y2="600" stroke="var(--dim)" stroke-width="1"/>
    <g id="knob"><circle r="13" fill="var(--bg)" stroke="var(--accent)" stroke-width="2"/><circle r="4" fill="var(--accent)"/></g>
  </g>
</svg>
<div id="tl">INFINITY MEP · <b id="pct">0%</b><br>PLAN → FORM</div>
<a class="back" href="./">← INDEX</a>
<div id="hint">DRAG&nbsp;THE&nbsp;KNOB&nbsp;·&nbsp;OR&nbsp;SCROLL&nbsp;TO&nbsp;EXTRUDE</div>
<div id="logo"><svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="13" stroke="var(--dim)" stroke-width="1.4"/>
<path d="M7 20 H15 V11 H23" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/>
<circle cx="7" cy="20" r="2.2" fill="var(--accent)"/><circle cx="23" cy="11" r="2.2" fill="var(--dim)"/></svg></div>

<script>
(function(){
  "use strict";
  const NS="http://www.w3.org/2000/svg";
  const el=(n,a)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const art=document.getElementById('art');
  const OX=560, OY=440, C=0.866, H=150, lerp=(a,b,t)=>a+(b-a)*t;
  // blended projection: t=0 top-down, t=1 isometric (with height z)
  let T=0;
  function P(x,y,z){
    const sx = lerp(x, (x-y)*C, T);
    const sy = lerp(y, (x+y)*0.5 - z, T);
    return [OX+sx, OY+sy];
  }
  const dpath=(...p)=>p.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' ');
  const polyp=p=>p.map(q=>q[0].toFixed(1)+','+q[1].toFixed(1)).join(' ');

  // ---- plan definition (centered) ----
  const OW=230, OD=160;
  const outer=[[-OW,-OD],[OW,-OD],[OW,OD],[-OW,OD]];
  // interior partition walls (segments)
  const walls=[
    [60,-OD,60,OD],
    [-OW,30,60,30],
    [60,-60,OW,-60],
  ];
  // windows (ticks on outer walls): [x1,y1,x2,y2]
  const windows=[
    [-OW,-90,-OW,-30],[-OW,40,-OW,110],
    [-120,-OD,-50,-OD],[40,-OD,-OW+10*0,-OD].slice(0,0) // placeholder removed below
  ];

  function build(){
    art.innerHTML='';
    const z=T*H;
    // floor slab
    const fc=outer.map(([x,y])=>P(x,y,0));
    art.appendChild(el('polygon',{points:polyp(fc),fill:'url(#floor)',stroke:'none'}));

    // extruded outer faces (only when rising)
    if(T>0.02){
      for(let i=0;i<4;i++){
        const a=outer[i], b=outer[(i+1)%4];
        const q=[P(a[0],a[1],0),P(b[0],b[1],0),P(b[0],b[1],z),P(a[0],a[1],z)];
        art.appendChild(el('polygon',{points:polyp(q),fill:'rgba(126,149,163,.08)',stroke:'rgba(220,228,234,.30)','stroke-width':1}));
      }
      // partition faces
      walls.forEach(([x1,y1,x2,y2])=>{
        const q=[P(x1,y1,0),P(x2,y2,0),P(x2,y2,z),P(x1,y1,z)];
        art.appendChild(el('polygon',{points:polyp(q),fill:'rgba(126,149,163,.06)',stroke:'rgba(220,228,234,.22)','stroke-width':1}));
      });
    }
    // base outline (always) + partitions base
    art.appendChild(el('polygon',{points:polyp(fc),fill:'none',stroke:'var(--wht)','stroke-width':2}));
    walls.forEach(([x1,y1,x2,y2])=>art.appendChild(el('path',{d:dpath(P(x1,y1,0),P(x2,y2,0)),stroke:'rgba(220,228,234,.7)','stroke-width':1.4,fill:'none'})));

    // windows (cyan) on base + up the wall
    [[-OW,-90,-OW,-30],[-OW,40,-OW,110],[-120,-OD,-40,-OD],[120,OD,40,OD]].forEach(([x1,y1,x2,y2])=>{
      art.appendChild(el('path',{d:dpath(P(x1,y1,0),P(x2,y2,0)),stroke:'var(--cyan)','stroke-width':2,fill:'none'}));
      if(T>0.05){
        art.appendChild(el('path',{d:dpath(P((x1+x2)/2,(y1+y2)/2,z*0.35),P((x1+x2)/2,(y1+y2)/2,z*0.72)),stroke:'var(--cyan)','stroke-width':2,opacity:.7,fill:'none'}));
      }
    });
    // door swing (entrance, bottom)
    art.appendChild(el('path',{d:`M${P(-30,OD,0)[0]} ${P(-30,OD,0)[1]} A 50 50 0 0 1 ${P(-30+0,OD-50,0)[0]} ${P(-30,OD-50,0)[1]}`,stroke:'var(--cyan)','stroke-width':1,opacity:.6,fill:'none'}));

    // roof slab on top
    if(T>0.04){
      const rc=outer.map(([x,y])=>P(x,y,z));
      art.appendChild(el('polygon',{points:polyp(rc),fill:'rgba(126,149,163,.16)',stroke:'var(--wht)','stroke-width':2}));
      // rooftop unit
      const ru=[[-60,-40],[10,-40],[10,30],[-60,30]];
      const rb=ru.map(([x,y])=>P(x,y,z)), rt=ru.map(([x,y])=>P(x,y,z+T*34));
      for(let i=0;i<4;i++){const a=ru[i],b=ru[(i+1)%4];
        art.appendChild(el('polygon',{points:polyp([P(a[0],a[1],z),P(b[0],b[1],z),P(b[0],b[1],z+T*34),P(a[0],a[1],z+T*34)]),fill:'rgba(55,194,214,.12)',stroke:'var(--cyan)','stroke-width':1}));}
      art.appendChild(el('polygon',{points:polyp(rt),fill:'rgba(55,194,214,.2)',stroke:'var(--cyan)','stroke-width':1}));
    }

    // dimensions (fade out as it rises)
    const dop=(1-T*1.3);
    if(dop>0.02){
      const O=34, wm=(OW*2*0.05).toFixed(1), hm=(OD*2*0.05).toFixed(1);
      const g=el('g',{opacity:dop.toFixed(2),stroke:'var(--dim)','stroke-width':1,fill:'none'});
      const tl=P(-OW,-OD,0), tr=P(OW,-OD,0), bl=P(-OW,OD,0);
      g.appendChild(el('path',{d:dpath([tl[0],tl[1]-O],[tr[0],tr[1]-O])}));
      g.appendChild(el('path',{d:dpath([tl[0],tl[1]],[tl[0],tl[1]-O-6])}));
      g.appendChild(el('path',{d:dpath([tr[0],tr[1]],[tr[0],tr[1]-O-6])}));
      g.appendChild(el('path',{d:dpath([tl[0]-O,tl[1]],[bl[0]-O,bl[1]])}));
      art.appendChild(g);
      const t1=el('text',{x:(tl[0]+tr[0])/2,y:tl[1]-O-10,'font-size':14,fill:'var(--cyan)','text-anchor':'middle',opacity:dop.toFixed(2)});t1.textContent=wm;art.appendChild(t1);
      const t2=el('text',{x:tl[0]-O-10,y:(tl[1]+bl[1])/2,'font-size':14,fill:'var(--cyan)','text-anchor':'middle',opacity:dop.toFixed(2),transform:`rotate(-90 ${tl[0]-O-10} ${(tl[1]+bl[1])/2})`});t2.textContent=hm;art.appendChild(t2);
    }
  }

  // ---- slider control ----
  const Y0=220,Y1=600, knob=document.getElementById('knob'), svg=document.getElementById('scene');
  function setT(t){T=Math.max(0,Math.min(1,t));build();
    knob.setAttribute('transform',`translate(1120 ${lerp(Y1,Y0,T)})`);
    document.getElementById('pct').textContent=Math.round(T*100)+'%';}
  function toY(e){const p=svg.createSVGPoint();p.x=e.clientX;p.y=e.clientY;return p.matrixTransform(svg.getScreenCTM().inverse()).y;}
  let drag=false;
  document.getElementById('slider').addEventListener('pointerdown',e=>{drag=true;setT((Y1-toY(e))/(Y1-Y0));e.preventDefault();});
  window.addEventListener('pointermove',e=>{if(drag)setT((Y1-toY(e))/(Y1-Y0));});
  window.addEventListener('pointerup',()=>drag=false);
  svg.addEventListener('wheel',e=>{e.preventDefault();setT(T+(e.deltaY<0?0.06:-0.06));},{passive:false});

  // intro auto-extrude once
  let intro=0;const iv=setInterval(()=>{intro+=0.018;setT(intro);if(intro>=1){clearInterval(iv);setTimeout(()=>{let b=1;const dv=setInterval(()=>{b-=0.02;setT(b);if(b<=0)clearInterval(dv);},16);},700);}},16);
  svg.addEventListener('pointerdown',()=>clearInterval(iv));
  setT(0);
})();
</script>
</body>
</html>
