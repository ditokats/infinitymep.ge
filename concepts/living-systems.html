<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Infinity MEP — Living Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e11;--wht:#d7e0e6;--cyan:#37c2d6;--blue:#3f86d6;--yellow:#ffce4d;
    --accent:#e2542a;--grn:#5cc878;--dim:#7e95a3;--night:0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);font-family:"IBM Plex Mono",monospace;color:var(--dim)}
  svg{width:100vw;height:100vh;display:block}
  text{user-select:none}
  /* flowing media */
  .flow{fill:none;stroke-linecap:round;stroke-dasharray:5 11;animation:flow 1.1s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-32}}
  .pipe{fill:none;stroke-linecap:round;opacity:.32}
  .sys{transition:opacity .5s}
  .sys.off{opacity:0!important;pointer-events:none}
  .reveal{stroke-dasharray:1400;stroke-dashoffset:1400;animation:rev 1.4s ease forwards}
  @keyframes rev{to{stroke-dashoffset:0}}
  .win{transition:opacity .6s,filter .6s}

  #frame{position:fixed;inset:14px;border:1px solid rgba(125,160,176,.28);pointer-events:none;z-index:8}
  #frame::before,#frame::after{content:"";position:absolute;width:14px;height:14px;border:1px solid var(--accent)}
  #frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
  #frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none}

  #legend{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:10;display:flex;gap:10px}
  #legend button{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;
    background:rgba(16,22,28,.66);border:1px solid rgba(125,160,176,.26);color:var(--dim);
    backdrop-filter:blur(6px);border-radius:3px;font-family:inherit;font-size:11px;letter-spacing:.12em;transition:.2s}
  #legend button:hover{color:var(--wht)}
  #legend button .sw{width:22px;height:3px;border-radius:2px;transition:.2s}
  #legend button.off{opacity:.4}
  #legend button.off .sw{opacity:.25}

  #tl{position:fixed;top:30px;left:30px;z-index:10;color:var(--dim);font-size:11px;letter-spacing:.16em;line-height:1.8}
  #tl b{color:var(--cyan);font-weight:500}
  #logo{position:fixed;right:30px;bottom:24px;z-index:10;display:flex;align-items:center;gap:12px;pointer-events:none}
  #logo svg{width:32px;height:32px}#logo .tb{width:1px;height:28px;background:rgba(125,160,176,.3)}
  #hint{position:fixed;top:50%;right:34px;transform:translateY(-50%);z-index:10;color:var(--dim);font-size:10px;
    letter-spacing:.14em;text-align:right;opacity:.7;animation:bob 2.4s ease-in-out infinite;pointer-events:none}
  @keyframes bob{50%{transform:translateY(calc(-50% - 6px))}}
  .back{position:fixed;top:30px;right:30px;z-index:10;color:var(--dim);text-decoration:none;font-size:11px;
    letter-spacing:.14em;border:1px solid rgba(125,160,176,.26);padding:9px 14px;border-radius:3px;transition:.2s}
  .back:hover{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
<svg id="scene" preserveAspectRatio="xMidYMid meet" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="dayG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22323f"/><stop offset="1" stop-color="#0d141a"/>
    </linearGradient>
    <radialGradient id="nightG" cx="78%" cy="22%" r="90%">
      <stop offset="0" stop-color="#13233f"/><stop offset="55%" stop-color="#0a1020"/><stop offset="1" stop-color="#05080f"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect x="0" y="0" width="1200" height="800" fill="url(#dayG)"/>
  <rect id="nightRect" x="0" y="0" width="1200" height="800" fill="url(#nightG)" opacity="0"/>

  <!-- celestial arc + sun -->
  <path id="arc" d="" fill="none" stroke="rgba(125,160,176,.25)" stroke-dasharray="3 8"/>
  <g id="sun" style="cursor:grab">
    <circle id="sunGlow" r="34" fill="var(--yellow)" opacity=".25" filter="url(#glow)"/>
    <circle id="sunCore" r="15" fill="var(--yellow)"/>
  </g>

  <!-- ground shadow -->
  <ellipse id="shadow" cx="600" cy="640" rx="250" ry="48" fill="#000" opacity=".35" filter="url(#soft)"/>

  <g id="building"></g>
  <g id="systems"></g>
</svg>

<div id="tl">INFINITY MEP · <b id="clock">12:00</b><br>LIVING SYSTEMS / AXON</div>
<a class="back" href="./">← INDEX</a>
<div id="hint">DRAG&nbsp;THE&nbsp;SUN&nbsp;↑<br>TOGGLE&nbsp;SYSTEMS&nbsp;↓</div>

<div id="legend">
  <button data-sys="water"><span class="sw" style="background:var(--blue)"></span>WATER</button>
  <button data-sys="air"><span class="sw" style="background:var(--cyan)"></span>HVAC</button>
  <button data-sys="elec"><span class="sw" style="background:var(--yellow)"></span>POWER</button>
</div>

<div id="logo">
  <svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="13" stroke="var(--dim)" stroke-width="1.4"/>
  <path d="M7 20 H15 V11 H23" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="7" cy="20" r="2.2" fill="var(--accent)"/><circle cx="23" cy="11" r="2.2" fill="var(--dim)"/></svg>
</div>

<script>
(function(){
  "use strict";
  const NS="http://www.w3.org/2000/svg";
  const el=(n,a)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const bG=document.getElementById('building'), sG=document.getElementById('systems');

  // ---- isometric projection ----
  const OX=600, OY=560, C=0.866, Sx=1;
  const P=(x,y,z)=>[OX+(x-y)*C, OY+(x+y)*0.5 - z];
  const d=(...pts)=>pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const poly=pts=>pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');

  const BW=300, BD=210, FH=120, FLOORS=3, TOP=FH*FLOORS;

  // ---- floor slabs ----
  for(let f=0; f<=FLOORS; f++){
    const z=f*FH;
    const c=[P(0,0,z),P(BW,0,z),P(BW,BD,z),P(0,BD,z)];
    bG.appendChild(el('polygon',{points:poly(c),fill:f===0?'rgba(126,149,163,.10)':'rgba(126,149,163,.05)',
      stroke:'rgba(215,224,230,.55)','stroke-width':f===0||f===FLOORS?1.6:1}));
  }
  // ---- corner columns ----
  [[0,0],[BW,0],[BW,BD],[0,BD]].forEach(([x,y])=>{
    bG.appendChild(el('path',{d:d(P(x,y,0),P(x,y,TOP)),stroke:'rgba(215,224,230,.6)','stroke-width':1.4,fill:'none'}));
  });
  // ---- two far walls with window grid (glow at night) ----
  const winG=el('g',{}); bG.appendChild(winG);
  function wall(ax,ay,bx,by){ // wall from (ax,ay)->(bx,by) footprint line, full height, windowed
    for(let f=0; f<FLOORS; f++){
      for(let b=0;b<4;b++){
        const t0=b/4+0.08, t1=(b+1)/4-0.08, z0=f*FH+18, z1=(f+1)*FH-14;
        const x0=ax+(bx-ax)*t0, y0=ay+(by-ay)*t0, x1=ax+(bx-ax)*t1, y1=ay+(by-ay)*t1;
        const pts=[P(x0,y0,z0),P(x1,y1,z0),P(x1,y1,z1),P(x0,y0,z1)];
        winG.appendChild(el('polygon',{points:poly(pts),class:'win',fill:'var(--yellow)',opacity:.04,
          stroke:'rgba(215,224,230,.22)','stroke-width':1}));
      }
    }
  }
  wall(0,0,BW,0);   // back-right face
  wall(0,0,0,BD);   // back-left face

  // ---- roof plant (AHU + tank) ----
  function box3(x,y,z,w,dp,h,stroke){
    const g=el('g',{});
    const top=[P(x,y,z+h),P(x+w,y,z+h),P(x+w,y+dp,z+h),P(x,y+dp,z+h)];
    const left=[P(x,y,z),P(x,y+dp,z),P(x,y+dp,z+h),P(x,y,z+h)];
    const right=[P(x,y+dp,z),P(x+w,y+dp,z),P(x+w,y+dp,z+h),P(x,y+dp,z+h)];
    g.appendChild(el('polygon',{points:poly(left),fill:'rgba(126,149,163,.10)',stroke,'stroke-width':1}));
    g.appendChild(el('polygon',{points:poly(right),fill:'rgba(126,149,163,.16)',stroke,'stroke-width':1}));
    g.appendChild(el('polygon',{points:poly(top),fill:'rgba(126,149,163,.22)',stroke,'stroke-width':1}));
    return g;
  }
  bG.appendChild(box3(40,150,TOP,70,46,40,'var(--cyan)'));   // AHU
  bG.appendChild(box3(210,30,TOP,40,40,52,'var(--blue)'));   // water tank

  // ================= SYSTEMS =================
  let wid=0;
  function route(cls,color,width,pts,opts={}){
    const dd=d(...pts.map(p=>P(...p)));
    const g=el('g',{class:'sys','data-sys':opts.sys});
    g.appendChild(el('path',{d:dd,class:'pipe reveal',stroke:color,'stroke-width':width+2}));
    g.appendChild(el('path',{d:dd,class:'flow',stroke:color,'stroke-width':width,
      style:`animation-duration:${opts.dur||1.1}s;animation-direction:${opts.rev?'reverse':'normal'}`}));
    sG.appendChild(g);
    return g;
  }
  function node(color,x,y,z,r=6){ sG.appendChild(el('circle',{cx:P(x,y,z)[0],cy:P(x,y,z)[1],r,fill:'var(--bg)',stroke:color,'stroke-width':1.6,class:'sys'})); }

  // WATER (blue): tank on roof -> riser down -> branch each floor
  (function(){
    const rx=230,ry=50, color='var(--blue)';
    const g1=route('water',color,3,[[rx,ry,TOP],[rx,ry,4]],{sys:'water',dur:1.4,rev:true});
    g1.setAttribute('data-sys','water');
    for(let f=1;f<=FLOORS;f++){const z=f*FH-FH+34;
      const g=route('water',color,2.4,[[rx,ry,z],[rx,ry+90,z],[rx-70,ry+90,z]],{sys:'water',dur:1.4,rev:true});
      g.setAttribute('data-sys','water'); node(color,rx-70,ry+90,z,5);
    }
    node(color,rx,ry,TOP,7);
  })();

  // HVAC (cyan): AHU -> vertical duct -> horizontal supply each floor
  (function(){
    const dx=70,dy=170, color='var(--cyan)';
    const g1=route('air',color,4,[[dx,dy,TOP],[dx,dy,8]],{sys:'air',dur:1.0});
    g1.setAttribute('data-sys','air');
    for(let f=1;f<=FLOORS;f++){const z=f*FH-FH+70;
      const g=route('air',color,3,[[dx,dy,z],[dx,dy-120,z],[dx+150,dy-120,z]],{sys:'air',dur:1.0});
      g.setAttribute('data-sys','air'); node(color,dx+150,dy-120,z,5);
    }
    node(color,dx,dy,TOP,7);
  })();

  // ELEC (yellow): panel floor1 -> riser -> branch to ceiling lights, with pulses
  (function(){
    const ex=40,ey=40, color='var(--yellow)';
    const g0=route('elec',color,2.6,[[ex,ey,18],[ex,ey,TOP-10]],{sys:'elec',dur:0.7});
    g0.setAttribute('data-sys','elec');
    for(let f=1;f<=FLOORS;f++){const z=f*FH-18;
      const id='wire'+f;
      const dd=d(P(ex,ey,z),P(ex+120,ey,z),P(ex+120,ey+150,z));
      const g=el('g',{class:'sys','data-sys':'elec'});
      g.appendChild(el('path',{id,d:dd,class:'pipe reveal',stroke:color,'stroke-width':2.6}));
      g.appendChild(el('path',{d:dd,class:'flow',stroke:color,'stroke-width':1.8,style:'animation-duration:.7s'}));
      // travelling pulse
      const pulse=el('circle',{r:3.2,fill:color,filter:'url(#glow)'});
      const am=el('animateMotion',{dur:(1.6+f*0.2)+'s',repeatCount:'indefinite',rotate:'auto'});
      am.appendChild(el('mpath',{href:'#'+id}));
      pulse.appendChild(am); g.appendChild(pulse);
      sG.appendChild(g);
      // ceiling light
      const lp=P(ex+120,ey+150,z);
      sG.appendChild(el('circle',{cx:lp[0],cy:lp[1],r:6,fill:color,opacity:.85,filter:'url(#glow)',class:'sys lamp','data-sys':'elec'}));
    }
    node(color,ex,ey,18,7);
  })();

  // ================= SUN / DAY-NIGHT =================
  const arc=document.getElementById('arc'), sun=document.getElementById('sun');
  const nightRect=document.getElementById('nightRect'), shadow=document.getElementById('shadow');
  const wins=[...document.querySelectorAll('.win')], lamps=[...document.querySelectorAll('.lamp')];
  const clock=document.getElementById('clock');
  const AX=600, AY=300, ARX=520, ARY=240;
  arc.setAttribute('d',`M${AX-ARX} ${AY} A ${ARX} ${ARY} 0 0 1 ${AX+ARX} ${AY}`);
  function setT(t){ // t:0..1 across sky
    t=Math.max(0,Math.min(1,t));
    const ang=Math.PI*(1-t);
    const x=AX-Math.cos(ang)*ARX, y=AY-Math.sin(ang)*ARY;
    sun.setAttribute('transform',`translate(${x} ${y})`);
    const day=Math.sin(t*Math.PI);                 // 1 at noon, 0 at horizons
    const night=Math.max(0,Math.min(1,1-day*1.25));
    nightRect.setAttribute('opacity',night.toFixed(3));
    document.getElementById('sunCore').setAttribute('fill', night>.5?'#cdd9e6':'#ffce4d');
    document.getElementById('sunGlow').setAttribute('fill', night>.5?'#9fb6cc':'#ffce4d');
    wins.forEach(w=>{w.style.opacity=(0.04+night*0.85);w.style.filter=night>.4?'url(#glow)':'none';});
    lamps.forEach(l=>l.style.opacity=(0.2+night*0.8));
    // shadow follows sun
    const sx=(t-0.5)*-460;
    shadow.setAttribute('cx',600+sx);
    shadow.setAttribute('rx',180+Math.abs(sx)*0.4);
    shadow.setAttribute('opacity',(0.12+day*0.32).toFixed(2));
    const hh=Math.floor(5+t*14), mm=Math.floor((((5+t*14)%1)*60));
    clock.textContent=String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  }
  // drag sun
  let drag=false;
  const svg=document.getElementById('scene');
  function evtT(e){
    const p=svg.createSVGPoint(); p.x=e.clientX; p.y=e.clientY;
    const w=p.matrixTransform(svg.getScreenCTM().inverse());
    return (w.x-(AX-ARX))/(2*ARX);
  }
  sun.addEventListener('pointerdown',e=>{drag=true;sun.style.cursor='grabbing';e.preventDefault();});
  window.addEventListener('pointermove',e=>{if(drag)setT(evtT(e));});
  window.addEventListener('pointerup',()=>{drag=false;sun.style.cursor='grab';});
  // also click anywhere on arc area to move
  svg.addEventListener('pointerdown',e=>{ if(e.target.closest('#sun'))return;
    if(e.clientY < window.innerHeight*0.5){ setT(evtT(e)); }});

  // gentle auto drift until first interaction
  let auto=true, tt=0.5, dir=1;
  sun.addEventListener('pointerdown',()=>auto=false);
  svg.addEventListener('pointerdown',()=>auto=false);
  function loop(){ if(auto){ tt+=0.0016*dir; if(tt>0.92||tt<0.08)dir*=-1; setT(tt);} requestAnimationFrame(loop);}
  setT(0.5); loop();

  // ================= legend toggles =================
  document.querySelectorAll('#legend button').forEach(b=>{
    b.addEventListener('click',()=>{
      b.classList.toggle('off');
      const s=b.dataset.sys, on=!b.classList.contains('off');
      document.querySelectorAll(`#systems [data-sys="${s}"]`).forEach(g=>{
        g.classList.toggle('off',!on);
        if(on){ g.querySelectorAll('.reveal').forEach(p=>{p.style.animation='none';p.getBBox();p.style.animation='';}); }
      });
    });
  });
})();
</script>
</body>
</html>
